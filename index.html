<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>duug waañ | générateur de recettes sénégalaises</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <link rel="icon" href="/assets/favicon/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn-script.com/ajax/libs/jquery/3.7.1/jquery.js"></script>
</head>
<body>
    
    <header class="recipe-header">
        <div class="header-content">
            <div class="logo-area">
                <a href="index.html" class="logo-link">
                    <i class="bi bi-fork-knife utensils-icon"></i>
                    <span class="recipe-text">duug waañ</span>
                </a>
            </div>
            <div class="header-actions">
                <div class="social-links">
                    <a href="https://github.com/metzoo10" class="social-github" target="_blank" title="GitHub" rel="noopener noreferrer"><i class="bi bi-github"></i></a>
                    <a href="https://linkedin.com/in/mouhamedba126/" class="social-linkedin" target="_blank" title="LinkedIn" rel="noopener noreferrer"><i class="bi bi-linkedin"></i></a>
                    <a href="https://twitter.com/metzoooo__" class="social-twitter" target="_blank" title="Twitter" rel="noopener noreferrer"><i class="bi bi-twitter"></i></a>
                </div>

                <button id="theme-toggle" class="btn-theme">
                    <span id="theme-icon">
                        ☀️
                    </span>
                </button>
            </div>
        </div>
    </header>

    <div class="container text-center mt-5">
        <h1 class="serif-font display-4">Vous avez faim ?</h1>
        <p class="lead">Obtenez une recette aléatoire en cliquant ci-dessous.</p>

        <button id="btn-obtenir" class="btn btn-outline-success btn-lg mt-3">
            OBTENIR UNE RECETTE 🍔
        </button>

        <div id="recipe-container" class="text-start">
            <div class="row g-4">
                <div class="col-md-5">
                    <img id="recipe-image" src="" alt="Image plat" class="img-placeholder rounded shadow-sm">
                </div>

                <div class="col-md-7">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 id="recipe-title" class="serif-font mb-3">Nom de la recette</h2>
                        <a id="recipe-video" class="btn btn-light btn-sm text-light" target="_blank" rel="noopener noreferrer">Vidéo</a>
                    </div>

                    <div class="box-info">
                        <h4 class="serif-font mb-3">Ingrédients</h4>
                        <ul id="recipe-ingredients" class="ps-3">
                            </ul>
                    </div>

                    <div class="box-info">
                        <h4 class="serif-font mb-3">Instructions</h4>
                        <div id="recipe-instructions">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="muted text-center mb-5" style="margin-top: 30px;">Made with &#x2764; by Mouhamed Ba - Avril 2026</footer>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>

</body>
</html>
